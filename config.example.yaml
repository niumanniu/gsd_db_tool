# db-diff 配置文件
# 用于数据库迁移/重构场景下的表结构和数据差异分析

# =============================================================================
# 源数据库配置（被对比的数据库）
# =============================================================================
source:
  driver: mysql           # 数据库驱动：mysql | oracle
  host: localhost         # 数据库主机地址
  port: 3306              # 数据库端口
  user: root              # 数据库用户名
  password: your_password # 数据库密码
  database: source_db     # 数据库名称
  schema:                 # Oracle schema（可选，Oracle 专属，默认与 user 相同）

# =============================================================================
# 目标数据库配置（对比的目标数据库）
# =============================================================================
target:
  driver: mysql           # 数据库驱动：mysql | oracle
  host: localhost         # 数据库主机地址
  port: 3306              # 数据库端口
  user: root              # 数据库用户名
  password: your_password # 数据库密码
  database: target_db     # 数据库名称
  schema:                 # Oracle schema（可选，Oracle 专属，默认与 user 相同）

# =============================================================================
# 对比选项配置
# =============================================================================
compare_options:
  mode: structure         # 对比模式：structure(结构对比) | data(数据对比) | all(全部)
  data_mode: count        # 数据对比模式：count(记录数) | full(全量) | sample(抽样)
  sample_ratio: 0.1       # 抽样比例 (0.0-1.0)，仅 data_mode=sample 时有效
  sample_size: 1000       # 抽样数量，仅 data_mode=sample 时有效
  tables: []              # 指定表列表，空数组表示所有表
                          # 示例：["users", "orders", "products"]
